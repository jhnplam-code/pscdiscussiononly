let currentQuestionIndex = 0;

// ഓപ്ഷനുകൾ റാൻഡം ആയി മിക്സ് ചെയ്യാനുള്ള ഫങ്ക്ഷൻ (Shuffle)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// ചോദ്യം പേജിൽ കാണിക്കുന്ന ഫങ്ക്ഷൻ
function loadQuestion() {
    const gameBox = document.getElementById('game-box');
    
    if (currentQuestionIndex >= quizData.length) {
        showFinalStory();
        return;
    }

    const currentData = quizData[currentQuestionIndex];
    let shuffledOptions = shuffleArray([...currentData.answers]);

    let html = `
        <div class="story-box">
            <p><strong>${currentData.story}</strong></p>
        </div>
        <p><strong>ചോദ്യം: ${currentData.question}</strong></p>
        <div class="options-container">
    `;

    // ഓരോ ഓപ്ഷനും ക്ലിക്ക് ചെയ്യുമ്പോൾ വാല്യൂ പാസ് ചെയ്യും. സൂചനകൾ ഒന്നും മുൻകൂട്ടി ഉണ്ടാകില്ല.
    shuffledOptions.forEach(option => {
        html += `<button class="option-btn" onclick="checkAnswer('${option.replace(/'/g, "\\'")}')">${option}</button>`;
    });

    html += `</div><div id="feedback-box"></div>`;
    gameBox.innerHTML = html;
}

// ഉത്തരം ശരിയാണോ എന്ന് പരിശോധിക്കുന്ന ഫങ്ക്ഷൻ
function checkAnswer(selectedAnswer) {
    const currentData = quizData[currentQuestionIndex];
    const feedbackBox = document.getElementById('feedback-box');
    
    if (selectedAnswer === currentData.correct) {
        feedbackBox.innerHTML = `
            <div class="feedback success">
                🎉 പ്രോത്സാഹനം! നിങ്ങൾ ആ പ്രശ്നത്തിൽ നിന്നും സുരക്ഷിതമായി രക്ഷപെട്ടു.
                <button class="btn-next" onclick="nextQuestion()">അടുത്ത പ്രശ്നത്തിലേക്ക് പോകുക -></button>
            </div>
        `;
    } else {
        feedbackBox.innerHTML = `
            <div class="feedback error">
                ⚠️ ആ ചോദ്യത്തിനുള്ള പ്രശ്നം തൊട്ടടുത്ത് എത്തിക്കഴിഞ്ഞു! നിങ്ങൾക്ക് ഒരു ചാൻസ് കൂടെ തരുന്നു. വീണ്ടും ശരിയായ ഉത്തരം കണ്ടെത്താൻ ശ്രമിക്കൂ.
                <button class="btn-next" style="background-color: #c0392b;" onclick="loadQuestion()">അതേ ചോദ്യം വീണ്ടും ശ്രമിക്കുക</button>
            </div>
        `;
    }
}

function nextQuestion() {
    currentQuestionIndex++;
    loadQuestion();
}
