    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 20px;
            padding: 40px;
            max-width: 850px;
            width: 100%;

            border: 2px solid #00e5ff;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #00e5ff;
            font-size: 36px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .story-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 22px;
            line-height: 1.6;
            border-left: 8px solid #ff9100;
            text-align: left;
        }
        .question-box {
            font-size: 26px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #fff;
            line-height: 1.5;
            text-align: left;
            background: rgba(0, 229, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (min-width: 768px) {
            .options-list {
                grid-template-columns: 1fr 1fr;
            }
        }
        .option-btn {
            display: block;
            width: 100%;
            background: #2c3e50;
            color: #ffffff;
            border: 2px solid #7f8c8d;
            padding: 18px 20px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            box-sizing: border-box;
        }
        .option-btn:hover {
            background: #34495e;
            border-color: #00e5ff;
            transform: translateY(-2px);
        }
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .btn {
            padding: 16px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            border: none;
            display: inline-block;
        }
        .btn-skip {
            background: #e67e22;
            color: white;
        }
        .btn-skip:hover {
            background: #d35400;
        }
        .btn-submit {
            background: #2ecc71;
            color: white;
            font-size: 26px;
            padding: 20px 45px;
        }
        .btn-submit:hover {
            background: #27ae60;
        }
        .btn-next {
            background: #00e5ff;
            color: black;
        }
        .btn-next:hover {
            background: #00b8d4;
        }
        .score-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            text-align: left;
            border: 1px solid #7f8c8d;
        }
        .score-item {
            font-size: 24px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
        }
        .score-total {
            font-size: 28px;
            font-weight: bold;
            color: #ffeb3b;
            border-top: 2px dashed #7f8c8d;
            padding-top: 15px;
            margin-top: 15px;
        }
        .progress {
            margin-top: 20px;
            font-size: 18px;
            color: #bdc3c7;
            font-weight: bold;
        }
        .msg-text {
            font-size: 24px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
    </style>
</head>

        { id: 25, q: "കേരളത്തിലെ ഗോത്രവർഗ്ഗ മേഖലകളിലെ ഗർഭിണികൾക്കും കുട്ടികൾക്കുമായി നടപ്പിലാക്കുന്ന പോഷകാഹാര പദ്ധതി?", a: "ജനനി ജന്മരക്ഷ", o: ["ജനനി ജന്മരക്ഷ", "അമൃതം", "സുപോഷണം", "പുഷ്ടി"] },
        { id: 26, q: "പാരമ്പര്യേതര രോഗങ്ങൾ തടയുന്നതിനായി കേരള ആരോഗ്യവകുപ്പ് ആരംഭിച്ച 'ശൈലി' ആപ്പ് ഏത് പദ്ധതിയുടെ ഭാഗമാണ്?", a: "നവകേരളം കർമ്മപദ്ധതി", o: ["നവകേരളം കർമ്മപദ്ധതി", "ആർദ്രം മിഷൻ 2.0", "ഈ-ഹെൽത്ത് കേരളം", "സുരക്ഷിത ആയുഷ്കാലം"] },
        { id: 27, q: "ജാപ്പനീസ് എൻസെഫലൈറ്റിസ് (മസ്തിഷ്ക ജ്വരം) രോഗത്തിന്റെ പ്രധാന രോഗവാഹകർ ആരാണ്?", a: "ക്യൂലക്സ് വിഷ്ണുയി കൊതുകുകൾ", o: ["ക്യൂലക്സ് വിഷ്ണുയി കൊതുകുകൾ", "ഈഡിസ് ഈജിപ്തി കൊതുകുകൾ", "അനാഫിലസ് സ്റ്റീഫൻസി കൊതുകുകൾ", "മൻസോണിയ യൂണിഫോർമിസ്"] },
        { id: 28, q: "കേരള സർക്കാർ ട്രാൻസ്ജെൻഡേഴ്സിന്റെ സുരക്ഷയ്ക്കും ക്ഷേമത്തിനുമായി ആവിഷ്കരിച്ച സമഗ്ര പദ്ധതി ഏതാണ്?", a: "മഴവില്ല്", o: ["മഴവില്ല്", "സഫലം", "സമഭാവന", "അനന്യ"] },
        { id: 29, q: "സ്ക്രബ് ടൈഫസ് (ചെള്ള് പനി) രോഗത്തിന് കാരണമാകുന്ന ബാക്ടീരിയ ഏതാണ്?", a: "ഓറിയൻഷ്യ സുത്സുഗാമുഷി", o: ["ഓറിയൻഷ്യ സുത്സുഗാമുഷി", "റിക്കറ്റീഷ്യ പ്രൊവാസെക്കി", "ബോറേലിയ ബർഗ്ഡോർഫേരി", "കോക്സിയെല്ല ബേർണെറ്റി"] },
        { id: 30, q: "കേരളത്തിൽ കുട്ടികളിലെ പ്രമേഹരോഗ ചികിത്സയ്ക്കായി സർക്കാർ ആരംഭിച്ച പദ്ധതി ഏതാണ്?", a: "മിഠായി", o: ["മിഠായി", "മധുരം", "തേൻതുള്ളി", "കുട്ടിക്കാലം"] }
    ];

    // സാഹചര്യം വിവരിക്കുന്ന മെസേജുകൾ
    const hazards = [
        "നിങ്ങൾ എവറസ്റ്റ് കൊടുമുടി കയറുന്നതിനിടയിൽ ഭീകരമായ മഞ്ഞുവീഴ്ചയിൽ പെട്ട് ഒറ്റപ്പെട്ടുപോയി! സുരക്ഷിതമായി പുറത്തുകടക്കാൻ ഓരോ ചോദ്യങ്ങൾക്കും ഉത്തരം നൽകുക.",
        "കാറ്റിന്റെ വേഗത കൂടുന്നു! താപനില മൈനസ് 30 ഡിഗ്രിയിലേക്ക് താഴ്ന്നു. വിറങ്ങലിക്കുന്ന തണുപ്പിൽ നിന്ന് രക്ഷപെടാൻ അടുത്ത കടമ്പ കടക്കുക!",
        "മുന്നിൽ വലിയൊരു മഞ്ഞുവിള്ളൽ (Crevasse) രൂപപ്പെട്ടിരിക്കുന്നു! സൂക്ഷിച്ചു മുന്നോട്ട് നീങ്ങുക!",
        "ഓക്സിജൻ അളവ് വളരെ കുറയുന്നു! ശ്വാസമെടുക്കാൻ ബുദ്ധിമുട്ടാണ്. നിങ്ങളുടെ മനസ്സിന്റെ ഏകാഗ്രത നിലനിർത്താൻ അടുത്ത ചോദ്യങ്ങൾക്ക് ഉത്തരം നൽകിയേ തീരൂ!",
        "അതിശക്തമായ ഹിമപാതം നിങ്ങളുടെ കാഴ്ച മറയ്ക്കുന്നു. വഴി പൂർണ്ണമായി നഷ്ടപ്പെട്ടു. ഇനിയുള്ള ചുവടുകൾ അതീവ നിർണ്ണായകമാണ്!",
        "നിങ്ങൾ എവറസ്റ്റിലെ ഏറ്റവും അപകടം പിടിച്ച 'ഡെത്ത് സോണിൽ' (Death Zone) എത്തിക്കഴിഞ്ഞു! ഇതാ കഠിനമായ അവസാന കടമ്പകൾ!"
    ];

    // ഗെയിം സ്റ്റേറ്റ് വേരിയബിളുകൾ
    let activeQuestions = []; // നിലവിലെ റൗണ്ടിൽ ചോദിക്കുന്ന ചോദ്യങ്ങൾ
    let currentIndex = 0;     // റൗണ്ടിലെ നിലവിലെ ചോദ്യ സൂചിക
    let totalQuestionsCount = masterQuestions.length; // ആകെ ചോദ്യങ്ങൾ (30)

    // നിലവിലെ റൗണ്ടിലെ സ്കോർ വിവരങ്ങൾ
    let roundCorrect = 0;
    let roundWrong = 0;
    let roundSkipped = 0;

    // മുൻ റൗണ്ടുകളിൽ ഇതിനകം ശരിയാക്കിയവയുടെ എണ്ണം
    let previouslyCorrectCount = 0;

    // എവറസ്റ്റ് സ്റ്റോറി മെസേജ് നൽകാൻ
    function getHazardMessage(index) {
        let level = Math.floor(index / 5);
        if (level > 5) level = 5;
        return hazards[level];
    }

    // ഓപ്ഷനുകൾ ഷഫിൾ ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
    function shuffle(array) {
        let current = array.length, random;
        while (current != 0) {
            random = Math.floor(Math.random() * current);
            current--;
            [array[current], array[random]] = [array[random], array[current]];
        }
        return array;
    }

    // ഗെയിം ആദ്യമായി തുടങ്ങുമ്പോൾ
    function initGame() {
        activeQuestions = JSON.parse(JSON.stringify(masterQuestions)); // ചോദ്യങ്ങൾ ലോഡ് ചെയ്യുന്നു
        activeQuestions.forEach(q => {
            q.shuffledOptions = shuffle([...q.o]); // ഓപ്ഷനുകൾ മിക്സ് ചെയ്യുന്നു
        });
        currentIndex = 0;
        previouslyCorrectCount = 0;
        resetRoundCounters();
        renderQuestion();
    }

    // റൗണ്ട് കൗണ്ടറുകൾ റീസെറ്റ് ചെയ്യാൻ
    function resetRoundCounters() {
        roundCorrect = 0;
        roundWrong = 0;
        roundSkipped = 0;
    }

    // ചോദ്യങ്ങൾ ഓരോന്നായി സ്ക്രീനിൽ കാണിക്കാൻ
    function renderQuestion() {
        const container = document.getElementById('game-container');
        
        // റൗണ്ടിലെ എല്ലാ ചോദ്യങ്ങളും കഴിഞ്ഞാൽ സബ്മിറ്റ് പേജ് കാണിക്കും
        if (currentIndex >= activeQuestions.length) {
            renderSubmitScreen();
            return;
        }

        const currentQ = activeQuestions[currentIndex];
        // എവറസ്റ്റിലെ മൊത്തം പുരോഗതി അറിയാൻ (മുൻപ് ശരിയാക്കിയവ + ഇപ്പോൾ എത്തിനിൽക്കുന്ന സ്ഥാനം)
        let overallProgressIndex = previouslyCorrectCount + currentIndex; 

        let html = `
            <h1>എവറസ്റ്റ് സർവൈവൽ ക്വിസ്</h1>
            <div class="story-box">
                <strong>നിലവിലെ സാഹചര്യം:</strong> ${getHazardMessage(overallProgressIndex)}
            </div>
            <div class="question-box">
                ചോദ്യം ${overallProgressIndex + 1}: ${currentQ.q}
            </div>
            <div class="options-list">
        `;

        // ഓപ്ഷൻ ബട്ടണുകൾ നിർമ്മിക്കുന്നു (സൂചനകൾ ഒന്നും തന്നെ ഉണ്ടാകില്ല)
        currentQ.shuffledOptions.forEach(option => {
            let escapedOption = option.replace(/'/g, "\\'");
            html += `
                <button class="option-btn" onclick="handleAnswer('${escapedOption}')">${option}</button>
            `;
        });

        html += `
            </div>
            <div class="action-btns">
                <button class="btn btn-skip" onclick="handleSkip()">ഈ ചോദ്യം സ്കിപ്പ് ചെയ്യുക (Skip)</button>
            </div>
            <div class="progress">പുരോഗതി: ${overallProgressIndex} / ${totalQuestionsCount} ചോദ്യങ്ങൾ പൂർത്തിയായി</div>
        `;

        container.innerHTML = html;
    }

    // ഉത്തരങ്ങളിൽ ക്ലിക്ക് ചെയ്യുമ്പോൾ
    window.handleAnswer = function(selected) {
        const currentQ = activeQuestions[currentIndex];
        if (selected === currentQ.a) {
            roundCorrect++;
            currentQ.status = 'correct';
        } else {
            roundWrong++;
            currentQ.status = 'wrong';
        }
        currentIndex++;
        renderQuestion();
    };

    // സ്കിപ്പ് ബട്ടൺ അമർത്തുമ്പോൾ
    window.handleSkip = function() {
        const currentQ = activeQuestions[currentIndex];
        roundSkipped++;
        currentQ.status = 'skipped';
        currentIndex++;
        renderQuestion();
    };

    // റൗണ്ട് തീരുമ്പോൾ സബ്മിറ്റ് ബട്ടൺ കാണിക്കുന്ന പേജ്
    function renderSubmitScreen() {
        const container = document.getElementById('game-container');
        container.innerHTML = `
            <h1>റൗണ്ട് പൂർത്തിയായിരിക്കുന്നു!</h1>
            <div class="msg-text" style="font-size: 26px; margin-top:30px;">
                നിങ്ങൾ ഈ റൗണ്ടിലെ മുഴുവൻ ചോദ്യങ്ങളും പൂർത്തിയാക്കിയിരിക്കുന്നു. <br>
                നിങ്ങളുടെ സ്കോർ കാണാൻ താഴെ നൽകിയിരിക്കുന്ന <strong>സബ്മിറ്റ്</strong> ബട്ടണിൽ ക്ലിക്ക് ചെയ്യുക.
            </div>
            <div class="action-btns">
                <button class="btn btn-submit" onclick="calculateAndShowScore()">സബ്മിറ്റ് (Submit)</button>
            </div>
        `;
    }

    // സ്കോർ കണക്കാക്കി കാണിക്കുന്ന പേജ്
    window.calculateAndShowScore = function() {
        const container = document.getElementById('game-container');
        
        // നെഗറ്റീവ് മാർക്ക് കണക്കാക്കൽ (ശരിക്ക് 1, തെറ്റിന് -0.33, സ്കിപ്പിന് 0)
        let score = (roundCorrect * 1) + (roundWrong * -0.33);
        // ദശാംശം വരികയാണെങ്കിൽ രണ്ട് അക്കമായി ചുരുക്കുന്നു
        if(score % 1 !== 0) {
            score = score.toFixed(2);
        }

        container.innerHTML = `
            <h1>ഫലപ്രഖ്യാപനം (Score Card)</h1>
            <div class="score-card">
                <div class="score-item"><span>ആകെ ശരിയുത്തരങ്ങൾ:</span> <strong>${roundCorrect}</strong></div>
                <div class="score-item"><span>ആകെ തെറ്റുത്തരങ്ങൾ:</span> <strong>${roundWrong}</strong></div>
                <div class="score-item"><span>സ്കിപ്പ് ചെയ്തവ:</span> <strong>${roundSkipped}</strong></div>
                <div class="score-item score-total"><span>ആകെ ലഭിച്ച സ്കോർ:</span> <span>${score}</span></div>
            </div>
            <div class="action-btns">
                <button class="btn btn-next" onclick="handlePostScoreNext()">ഓക്കേ (OK)</button>
            </div>
        `;
    };

    // ഓക്കേ ബട്ടൺ അമർത്തുമ്പോൾ അടുത്ത ഘട്ടത്തിലേക്ക് പോകുന്ന പേജ്
    window.handlePostScoreNext = function() {
        const container = document.getElementById('game-container');
        
        // ഈ റൗണ്ടിൽ ശരിയാക്കിയവ മുൻപ് ശരിയാക്കിയവയോട് കൂട്ടുന്നു
        previouslyCorrectCount += roundCorrect;

        // തെറ്റിയതും സ്കിപ്പ് ചെയ്തതുമായ ചോദ്യങ്ങൾ മാത്രം കണ്ടെത്തുന്നു
        let nextRoundQuestions = activeQuestions.filter(q => q.status === 'wrong' || q.status === 'skipped');

        if (nextRoundQuestions.length === 0) {
            // എല്ലാ ചോദ്യങ്ങളും ശരിയാക്കിയെങ്കിൽ
            container.innerHTML = `
                <h1>അഭിനന്ദനങ്ങൾ! 🎉</h1>
                <div class="msg-text" style="font-size: 30px; color: #2ecc71; font-weight: bold; margin-top: 40px;">
                    നിങ്ങൾ എല്ലാ ചോദ്യങ്ങൾക്കും ശരിയുത്തരം കണ്ടെത്തിയിരിക്കുന്നു!
                </div>
                <div class="story-box" style="border-left-color: #2ecc71; font-size: 24px; text-align: center;">
                    നിങ്ങൾ എവറസ്റ്റിന്റെ കൊടുമുടി കീഴടക്കി വിജയകരമായി തിരിച്ചെത്തിയിരിക്കുന്നു. ചലഞ്ച് പൂർത്തിയായി!
                </div>
                <div class="action-btns">
                    <button class="btn btn-next" style="background: #ff9100;" onclick="initGame()">വീണ്ടും കളിക്കുക</button>
                </div>
            `;
        } else {
            // തെറ്റിയതോ സ്കിപ്പ് ചെയ്തതോ ആയ ചോദ്യങ്ങൾ ബാക്കിയുണ്ടെങ്കിൽ
            container.innerHTML = `
                <h1>അടുത്ത ഘട്ടം (Review Round)</h1>
                <div class="msg-text" style="font-size: 26px; margin-top: 30px;">
                    തെറ്റുത്തരങ്ങൾ ശരിയാക്കുന്നതിനും സ്കിപ്പ് ചെയ്തവ വീണ്ടും ശ്രമിക്കുന്നതിനും നിങ്ങൾക്ക് ഒരു അവസരം കൂടി ലഭ്യമാണ്.
                </div>
                <div class="story-box" style="font-size: 24px;">
                    തയ്യാറാണെങ്കിൽ താഴെയുള്ള <strong>'ലെറ്റ്സ് ഗോ'</strong> ബട്ടണിൽ ക്ലിക്ക് ചെയ്ത് അടുത്ത ഗെയിം ആരംഭിക്കുക.
                </div>
                <div class="action-btns">
                    <button class="btn btn-submit" style="background: #9b59b6;" onclick="startNextRound(${JSON.stringify(nextRoundQuestions).replace(/"/g, '&quot;')})">ലെറ്റ്സ് ഗോ (Let's Go)</button>
                </div>
            `;
        }
    };

    // അടുത്ത റൗണ്ട് (തെറ്റിയവയും സ്കിപ്പ് ചെയ്തവയും മാത്രം വെച്ച്) തുടങ്ങാൻ
    window.startNextRound = function(nextQuestions) {
        activeQuestions = nextQuestions;
        // ഓരോ തവണയും ചോദ്യങ്ങളുടെ ഓപ്ഷനുകൾ വീണ്ടും ഷഫിൾ ചെയ്യുന്നു
        activeQuestions.forEach(q => {
            q.shuffledOptions = shuffle([...q.o]);
            delete q.status; // പഴയ സ്റ്റാറ്റസ് ഒഴിവാക്കുന്നു
        });
        currentIndex = 0;
        resetRoundCounters();
        renderQuestion();
    };

    // കളി ആരംഭിക്കുന്നു
    initGame();
</script>
